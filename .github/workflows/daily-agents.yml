name: Daily Content Generation

on:
  schedule:
    # Runs daily at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  news-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run News Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node src/agents/newsAgent.js

      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: news-data
          path: |
            data/news.json
            public/images/news-*.png

  content-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run Content Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node src/agents/contentAgent.js

      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: content-data
          path: |
            data/content.json
            public/images/content-*.png

  review-and-commit:
    needs: [news-agent, content-agent]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Download news data
        uses: actions/download-artifact@v4
        with:
          name: news-data

      - name: Download content data
        uses: actions/download-artifact@v4
        with:
          name: content-data

      - name: Run Review Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node src/agents/reviewAgent.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/images/
          git diff --staged --quiet || git commit -m "Daily content update $(date -u +%Y-%m-%d)"
          git push
